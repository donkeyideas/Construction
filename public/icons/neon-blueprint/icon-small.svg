<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <rect width="32" height="32" rx="7" fill="#020617"/>

  <!-- Subtle grid -->
  <g stroke="#06b6d4" opacity="0.08" stroke-width="0.5">
    <line x1="8" y1="0" x2="8" y2="32"/><line x1="16" y1="0" x2="16" y2="32"/><line x1="24" y1="0" x2="24" y2="32"/>
    <line x1="0" y1="8" x2="32" y2="8"/><line x1="0" y1="16" x2="32" y2="16"/><line x1="0" y1="24" x2="32" y2="24"/>
  </g>

  <!-- Glowing B outline -->
  <path fill="none" stroke="#06b6d4" stroke-width="2" stroke-linejoin="round" filter="url(#glow)" d="
    M 9 6 L 19 6 C 23 6 25 8.5 25 11 C 25 13.5 23.5 15.2 21.5 16
    C 24 17 26 19 26 22 C 26 25.5 23 28 19.5 28 L 9 28 Z
  "/>
  <path fill="none" stroke="#06b6d4" stroke-width="1.2" opacity="0.6" filter="url(#glow)" d="
    M 13 10 L 18 10 C 20 10 21 11 21 12 C 21 13 20 14 18 14 L 13 14 Z
  "/>
  <path fill="none" stroke="#06b6d4" stroke-width="1.2" opacity="0.6" filter="url(#glow)" d="
    M 13 18.5 L 18.5 18.5 C 21 18.5 22 20 22 21.5 C 22 23 21 24.5 18.5 24.5 L 13 24.5 Z
  "/>
</svg>
